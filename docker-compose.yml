name: spatial-viz

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: spatial-viz:latest
    container_name: spatial-viz
    restart: unless-stopped
    ports:
      - "${SPATIALVIZ_PORT:-8123}:80"
    volumes:
      # Put dataset folders and optional datasets.config.json in ./data on the host.
      - "${SPATIALVIZ_DATA_DIR:-./data}:/data:ro"
    environment:
      SPATIALVIZ_DATA_DIR: /data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/spatial-viz/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
