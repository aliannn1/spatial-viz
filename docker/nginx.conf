server {
    absolute_redirect off;
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;
    charset utf-8;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    client_max_body_size 0;

    add_header Accept-Ranges bytes always;
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Range, Content-Type, Origin, Accept" always;

    gzip on;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/wasm;

    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    location = /spatial-viz/healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    location = / {
        return 302 /spatial-viz/;
    }

    location = /spatial-viz {
        return 301 /spatial-viz/;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache" always;
    }

    location ~* \.json$ {
        default_type application/json;
        expires 5m;
        add_header Cache-Control "public, max-age=300" always;
    }

    location ~* \.(js|css)$ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600" always;
    }

    # Nginx supports HTTP byte ranges for static files by default.
    # The viewer uses Range requests for sparse expression chunks.
    location ~* \.(bin|ply)$ {
        default_type application/octet-stream;
        expires 30d;
        add_header Accept-Ranges bytes always;
        add_header Cache-Control "public, max-age=2592000, immutable" always;
    }
}
